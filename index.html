<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小狐大世界</title>
<link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
<div id="header">
  <h1>小狐大世界</h1>
  <div id="header-right">
    <a onclick="resetGame()">重置</a>
    <a onclick="manualSave()">存档</a>
    <a onclick="showCodeExport()">存档码</a>
    <a onclick="showCodeImport()">导入存档码</a>
    <span id="season-display"></span>
  </div>
</div>
<div id="game">
  <div id="left-panel">
    <div id="fox-info"></div>
    <div id="energy-bar"></div>
    <div id="leyline-bar"></div>
    <div id="pollution-bar"></div>
    <div id="unrest-bar"></div>
    <div id="res-list"></div>
  </div>
  <div id="center-panel">
    <div id="tabs"></div>
    <div id="exp-status"></div>
    <div id="tc"></div>
  </div>
  <div id="log-panel">
    <div id="log-list"></div>
  </div>
</div>
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:none;align-items:center;justify-content:center;">
  <div id="modal-box" style="background:#fff;border:1px solid #ccc;padding:16px 20px;width:420px;max-width:90vw;box-shadow:2px 4px 12px rgba(0,0,0,.15);font-size:13px;">
    <div id="modal-title" style="font-weight:bold;margin-bottom:8px;"></div>
    <div id="modal-body"></div>
    <div style="text-align:right;margin-top:10px;">
      <button onclick="closeModal()" style="padding:3px 12px;cursor:pointer;border:1px solid #bbb;background:#fff;font-size:12px;">关闭</button>
    </div>
  </div>
</div>
<script src="js/data.js?v=53"></script>
<script src="js/engine.js?v=39"></script>
<script src="js/engine-actions.js?v=25"></script>
<script src="js/engine-systems.js?v=15"></script>
<script src="js/ui.js?v=37"></script>
</body>
</html>
